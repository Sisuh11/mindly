<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flashcards de Elite - Mindly</title>
    <!-- Favicon -->
    <link rel="icon" href="assets/logo.png" type="image/png">
    
    <!-- Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    
    <!-- CSS Dependencies -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">

    <!-- Theme Control -->
    <script>
        const temaSalvo = localStorage.getItem('theme');
        const prefereDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
        const temaInicial = temaSalvo || (prefereDark ? 'dark' : 'light');
        if (temaInicial === 'dark') {
            document.documentElement.setAttribute('data-theme', 'dark');
        }

        // Proteção de Rota (Simulação de Login)
        document.addEventListener('DOMContentLoaded', () => {
            const userLogged = localStorage.getItem('mindly_user_logged');
            if(userLogged !== 'Alex') {
                window.location.href = 'login.html';
            }
        });
    </script>

    <style>
        :root {
            --card-width: 450px;
            --card-height: 320px;
        }

        body {
            background-color: var(--bg-light);
            overflow-x: hidden;
        }

        /* --- Header & Stats --- */
        .stats-bar {
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 15px;
            padding: 1rem 2rem;
            display: flex;
            justify-content: space-around;
            align-items: center;
            margin-bottom: 3rem;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
        }

        .stat-item {
            text-align: center;
        }

        .stat-value {
            display: block;
            font-size: 1.5rem;
            font-weight: 800;
            color: var(--primary-color);
        }

        .stat-label {
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--text-muted);
            font-weight: 600;
        }

        /* --- Flashcard Stack Engine --- */
        .flashcard-container {
            position: relative;
            width: var(--card-width);
            height: var(--card-height);
            margin: 0 auto 4rem;
            perspective: 1500px;
        }

        .flashcard-stack-bg {
            position: absolute;
            top: 10px;
            left: 10px;
            width: 100%;
            height: 100%;
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 24px;
            z-index: 1;
            transform: rotate(-2deg);
            opacity: 0.5;
        }

        .flashcard {
            position: relative;
            width: 100%;
            height: 100%;
            transform-style: preserve-3d;
            transition: transform 0.6s cubic-bezier(0.4, 0, 0.2, 1);
            cursor: pointer;
            z-index: 2;
        }

        .flashcard.flipped {
            transform: rotateY(180deg);
        }

        .card-face {
            position: absolute;
            width: 100%;
            height: 100%;
            backface-visibility: hidden;
            border-radius: 24px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 2.5rem;
            box-shadow: 0 10px 30px rgba(0,0,0,0.08);
            border: 1px solid var(--border-color);
            text-align: center;
        }

        .card-front {
            background: var(--card-bg);
            color: var(--text-main);
        }

        .card-back {
            background: linear-gradient(135deg, var(--primary-color), #2196F3);
            color: white;
            transform: rotateY(180deg);
        }

        .card-tag {
            position: absolute;
            top: 2rem;
            left: 2rem;
            background: rgba(var(--primary-rgb, 239, 68, 35), 0.1);
            color: var(--primary-color);
            padding: 0.4rem 1rem;
            border-radius: 50px;
            font-size: 0.75rem;
            font-weight: 800;
            text-transform: uppercase;
        }

        .card-back .card-tag {
            background: rgba(255,255,255,0.2);
            color: white;
        }

        .card-content {
            font-size: 1.4rem;
            font-weight: 600;
            line-height: 1.4;
        }

        /* --- Controls --- */
        .difficulty-controls {
            display: flex;
            justify-content: center;
            gap: 1rem;
            opacity: 0;
            transform: translateY(20px);
            transition: all 0.3s ease;
            pointer-events: none;
        }

        .difficulty-controls.visible {
            opacity: 1;
            transform: translateY(0);
            pointer-events: all;
        }

        .btn-diff {
            border: none;
            padding: 0.8rem 1.8rem;
            border-radius: 12px;
            font-weight: 700;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .btn-diff:hover { transform: translateY(-3px); }

        .btn-hard { background: #fee2e2; color: #ef4444; }
        .btn-medium { background: #fef3c7; color: #d97706; }
        .btn-easy { background: #dcfce7; color: #16a34a; }

        /* --- Animations --- */
        @keyframes slideNext {
            0% { transform: translate(0, 0) rotate(0deg); opacity: 1; }
            50% { transform: translate(200%, -50%) rotate(20deg); opacity: 0; }
            51% { transform: translate(-200%, 50%) rotate(-20deg); opacity: 0; }
            100% { transform: translate(0, 0) rotate(0deg); opacity: 1; }
        }

        .animate-next { animation: slideNext 0.6s cubic-bezier(0.4, 0, 0.2, 1); }

        /* --- Desktop Responsive --- */
        @media (max-width: 576px) {
            :root {
                --card-width: 90vw;
                --card-height: 350px;
            }
        }
    </style>
</head>
<body>

    <!-- NAVBAR -->
    <nav class="navbar navbar-expand-lg navbar-custom">
        <div class="container-fluid" style="max-width: 1300px;">
            <a class="navbar-brand logo-container" href="dashboard.html">
                <img src="assets/logo.png" alt="Mindly Logo">
            </a>
            <div class="ms-auto d-flex align-items-center auth-links">
                <a href="dashboard.html" class="btn btn-outline-secondary btn-sm rounded-pill me-3">
                    <i class="bi bi-arrow-left"></i> Sair da Revisão
                </a>
                <a href="perfil.html" class="d-flex align-items-center text-decoration-none me-3">
                    <img src="https://api.dicebear.com/7.x/avataaars/svg?seed=Alex" alt="Avatar" class="rounded-circle border border-2 border-primary me-2" width="35" height="35">
                    <span class="fw-bold small d-none d-lg-inline" style="color: var(--text-main);">Alex</span>
                </a>
            </div>
        </div>
    </nav>

    <main class="container py-5">
        <div class="row justify-content-center">
            <div class="col-lg-10">
                
                <!-- Stats Bar -->
                <div class="stats-bar mb-5" data-aos="fade-down">
                    <div class="stat-item">
                        <span class="stat-value" id="count-total">0</span>
                        <span class="stat-label">Total Vistos</span>
                    </div>
                    <div class="stat-item">
                        <span class="stat-value" id="count-mastered" style="color: #16a34a;">0</span>
                        <span class="stat-label">Dominados</span>
                    </div>
                    <div class="stat-item">
                        <span class="stat-value" id="count-streak">0</span>
                        <span class="stat-label">Fogo do Dia</span>
                    </div>
                    <div class="stat-item d-none d-md-block">
                        <div class="progress" style="width: 100px; height: 10px; border-radius: 10px; background: #eee;">
                            <div id="session-progress" class="progress-bar bg-primary" style="width: 5%"></div>
                        </div>
                        <span class="stat-label">Sessão</span>
                    </div>
                </div>

                <!-- Interaction Area -->
                <div class="text-center mb-4">
                    <h1 class="fw-800 mb-2">Revisão Espaçada</h1>
                    <p class="text-muted">Clique na carta para revelar a resposta</p>
                </div>

                <div class="flashcard-container" data-aos="zoom-in" data-aos-delay="200">
                    <div class="flashcard-stack-bg"></div>
                    <div class="flashcard" id="main-card" onclick="flipCard()">
                        <!-- Frente -->
                        <div class="card-face card-front">
                            <span class="card-tag" id="card-tag">Carregando...</span>
                            <div class="card-content" id="card-question">
                                Preparando seu baralho de elite...
                            </div>
                        </div>
                        <!-- Verso -->
                        <div class="card-face card-back">
                            <span class="card-tag">Resposta</span>
                            <div class="card-content" id="card-answer">
                                ...
                            </div>
                        </div>
                    </div>
                </div>

                <!-- Controls -->
                <div class="difficulty-controls" id="controls">
                    <button class="btn-diff btn-hard" onclick="rateCard('hard')">
                        <i class="bi bi-x-circle-fill"></i> Difícil
                    </button>
                    <button class="btn-diff btn-medium" onclick="rateCard('medium')">
                        <i class="bi bi-dash-circle-fill"></i> Médio
                    </button>
                    <button class="btn-diff btn-easy" onclick="rateCard('easy')">
                        <i class="bi bi-check-circle-fill"></i> Fácil
                    </button>
                </div>

            </div>
        </div>
    </main>

    <!-- SCRIPTS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
    <script src="theme.js"></script>
    <script>
        AOS.init({ duration: 800, once: true });

        // DATABASE DE ELITE (PROVISÓRIA ATÉ BACKEND)
        const deck = [
            { id: 1, tag: "Matemática", q: "Qual a fórmula da área do trapézio?", a: "A = ((B+b).h)/2" },
            { id: 2, tag: "Física", q: "Qual a fórmula da velocidade média?", a: "Vm = ΔS / Δt" },
            { id: 3, tag: "Biologia", q: "Qual a base nitrogenada exclusiva do RNA?", a: "Uracila" },
            { id: 4, tag: "Química", q: "O que caracteriza uma reação exotérmica?", a: "Liberação de calor (ΔH < 0)" },
            { id: 5, tag: "História", q: "Em que ano começou a Revolução Francesa?", a: "1789" },
            { id: 6, tag: "Geografia", q: "Qual o maior bioma brasileiro?", a: "Amazônia" },
            { id: 7, tag: "Linguagens", q: "O que é uma metáfora?", a: "Uma comparação implícita sem o conectivo 'como'." },
            { id: 8, tag: "Redação", q: "Quantas competências são avaliadas no ENEM?", a: "5 Competências (200 pontos cada)" },
            { id: 9, tag: "Filosofia", q: "De quem é a frase 'Penso, logo existo'?", a: "René Descartes" },
            { id: 10, tag: "Sociologia", q: "Quem cunhou o termo 'Fato Social'?", a: "Émile Durkheim" }
        ];

        let currentIdx = 0;
        let stats = {
            total: 0,
            mastered: 0,
            streak: 0
        };

        // Carregar stats do localStorage
        function loadStats() {
            const saved = localStorage.getItem('mindly_flash_stats');
            if(saved) {
                stats = JSON.parse(saved);
                updateStatsUI();
            }
        }

        function updateStatsUI() {
            document.getElementById('count-total').innerText = stats.total;
            document.getElementById('count-mastered').innerText = stats.mastered;
            document.getElementById('count-streak').innerText = stats.streak || 0;
            
            // Progress bar simples (loop de 10)
            const progress = ((stats.total % 10) || 10) * 10;
            document.getElementById('session-progress').style.width = progress + '%';
        }

        function renderCard() {
            const cardData = deck[currentIdx];
            document.getElementById('card-tag').innerText = cardData.tag;
            document.getElementById('card-question').innerText = cardData.q;
            document.getElementById('card-answer').innerText = cardData.a;
        }

        function flipCard() {
            const card = document.getElementById('main-card');
            const controls = document.getElementById('controls');
            
            card.classList.toggle('flipped');
            
            if(card.classList.contains('flipped')) {
                controls.classList.add('visible');
            } else {
                controls.classList.remove('visible');
            }
        }

        function rateCard(level) {
            // Lógica SRS básica: se fácil, conta como dominado
            stats.total++;
            if(level === 'easy') stats.mastered++;
            if(level !== 'hard') stats.streak++; else stats.streak = 0;

            localStorage.setItem('mindly_flash_stats', JSON.stringify(stats));
            updateStatsUI();

            // Animação de Próximo
            const card = document.getElementById('main-card');
            card.classList.add('animate-next');
            
            setTimeout(() => {
                card.classList.remove('flipped');
                document.getElementById('controls').classList.remove('visible');
                
                // Troca o conteúdo no meio da animação (quando invisível/longe)
                setTimeout(() => {
                    currentIdx = (currentIdx + 1) % deck.length;
                    renderCard();
                }, 100);

                setTimeout(() => {
                    card.classList.remove('animate-next');
                }, 500);
            }, 100);
        }

        // Init
        window.onload = () => {
            loadStats();
            renderCard();
        };

    </script>
</body>
</html>
