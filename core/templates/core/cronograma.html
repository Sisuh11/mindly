<!DOCTYPE html>
{% load static %}
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gerador de Cronograma - Mindly IA</title>
    <link rel="icon" href="{% static 'core/assets/logo.png' %}" type="image/png">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
    <link rel="stylesheet" href="{% static 'core/css/style.css' %}">
    <script>
        const temaSalvo = localStorage.getItem('theme');
        const prefereDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
        const temaInicial = temaSalvo || (prefereDark ? 'dark' : 'light');
        if (temaInicial === 'dark') {
            document.documentElement.setAttribute('data-theme', 'dark');
        }

        // Proteção de Rota (Simulação de Login)
        document.addEventListener('DOMContentLoaded', () => {
            const userLogged = localStorage.getItem('mindly_user_logged');
            if(userLogged !== 'Alex') {
                window.location.href = "{% url 'core:login' %}";
            }
        });
</script>
</head>
<body style="background: var(--bg-body);">

    <nav class="navbar navbar-expand-lg navbar-custom">
        <div class="container-fluid" style="max-width: 1300px;">
            <a class="navbar-brand logo-container" href="{% url 'core:dashboard' %}">
                <img src="{% static 'core/assets/logo.png' %}" alt="Mindly Logo">
            </a>
            <div class="collapse navbar-collapse d-flex justify-content-end">
                <div class="d-flex align-items-center auth-links">
                    <a href="{% url 'core:perfil' %}" class="d-flex align-items-center text-decoration-none me-3">
                        <img src="https://api.dicebear.com/7.x/avataaars/svg?seed=Alex" alt="Avatar" class="rounded-circle border border-2 border-primary me-2" width="35" height="35">
                        <span class="fw-bold small d-none d-lg-inline" style="color: var(--text-main);">Alex</span>
                    </a>
                </div>
            </div>
        </div>
    </nav>

    <main class="container py-5" data-aos="zoom-in">
        <div class="row justify-content-center">
            <div class="col-lg-8">
                <div class="card p-5 border-0 shadow-lg hover-lift" style="border-radius: 25px; background: var(--bg-card);">
                    <div class="text-center mb-5">
                        <div class="p-3 rounded-circle bg-primary-soft d-inline-block mb-3" style="background: rgba(var(--primary-rgb), 0.1);">
                            <i class="bi bi-calendar-check fs-1 color-primary"></i>
                        </div>
                        <h1 class="fw-bold" style="color: var(--text-main);">Gerador de Cronograma IA</h1>
                        <p class="text-muted">Descreva sua rotina e deixe que o Mindly crie o melhor roteiro de estudos para você.</p>
                    </div>

                    <form id="cronogramaForm">
                        <div class="mb-4">
                            <label class="form-label fw-bold">Quanto tempo você tem por dia?</label>
                            <select class="form-select form-control-custom" id="tempoDisponivel">
                                <option value="2h">2 Horas (Foco Rápido)</option>
                                <option value="4h">4 Horas (Equilibrado)</option>
                                <option value="6h">6 Horas (Intensivo)</option>
                                <option value="8h">8 Horas (Modo Elite)</option>
                            </select>
                        </div>

                        <div class="mb-4">
                            <label class="form-label fw-bold">Qual seu maior objetivo?</label>
                            <input type="text" class="form-control-custom" id="objetivo" placeholder="Ex: Medicina na USP, Direito na UFMG...">
                        </div>

                        <div class="mb-5">
                            <label class="form-label fw-bold">Matérias com maior dificuldade:</label>
                            <div class="row">
                                <div class="col-md-4">
                                    <div class="form-check"><input class="form-check-input" type="checkbox" value="Matemática"> Matemática</div>
                                    <div class="form-check"><input class="form-check-input" type="checkbox" value="Física"> Física</div>
                                </div>
                                <div class="col-md-4">
                                    <div class="form-check"><input class="form-check-input" type="checkbox" value="Química"> Química</div>
                                    <div class="form-check"><input class="form-check-input" type="checkbox" value="Biologia"> Biologia</div>
                                </div>
                                <div class="col-md-4">
                                    <div class="form-check"><input class="form-check-input" type="checkbox" value="Redação"> Redação</div>
                                    <div class="form-check"><input class="form-check-input" type="checkbox" value="História"> História</div>
                                </div>
                            </div>
                        </div>

                        <button type="button" class="btn-solid w-100 p-3 hover-pulse" onclick="gerarCronograma()">
                            <i class="bi bi-magic me-2"></i> Gerar Meu Plano de Estudos
                        </button>
                    </form>

                    <!-- Resultado da IA -->
                    <div id="resultadoIA" class="d-none mt-5">
                        <div class="border-top pt-5">
                            <h4 class="fw-bold mb-4"><i class="bi bi-stars text-warning"></i> Seu Cronograma Personalizado</h4>
                            <div id="outputCronograma" class="p-4 rounded-4" style="background: var(--bg-body); border: 1px solid var(--border-color);">
                                <!-- Conteúdo gerado -->
                            </div>
                            <div class="mt-4 d-flex gap-2">
                                <button class="btn btn-primary rounded-pill px-4"><i class="bi bi-download me-2"></i> Baixar PDF</button>
                                <button class="btn btn-outline-secondary rounded-pill px-4" onclick="location.reload()"><i class="bi bi-arrow-repeat me-2"></i> Refazer</button>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">
    <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
    <script src="{% static 'core/js/theme.js' %}"></script>
    <script>
        AOS.init({ duration: 800, once: true });
        async function gerarCronograma() {
            const output = document.getElementById('outputCronograma');
            const resultado = document.getElementById('resultadoIA');
            const form = document.getElementById('cronogramaForm');
            
            form.classList.add('opacity-50');
            resultado.classList.remove('d-none');
            output.innerHTML = '<div class="spinner-border text-primary" role="status"></div> Analisando sua rotina...';

            // Simulação de IA processando
            setTimeout(() => {
                const tempo = document.getElementById('tempoDisponivel').value;
                const objetivo = document.getElementById('objetivo').value || "sua aprovação";
                
                let html = `<h5>Foco: ${objetivo} (${tempo}/dia)</h5><hr>`;
                html += `<div class="table-responsive">
                            <table class="table table-borderless mt-3" style="color: var(--text-main);">
                                <thead><tr class="text-muted border-bottom"><th class="pb-3">Dia</th><th class="pb-3">Manhã</th><th class="pb-3">Tarde/Noite</th></tr></thead>
                                <tbody>
                                    <tr class="border-bottom"><td class="py-3">Segunda</td><td class="py-3">Matemática (Lógica)</td><td class="py-3">Redação (Rascunho)</td></tr>
                                    <tr class="border-bottom"><td class="py-3">Terça</td><td class="py-3">Biologia (Genética)</td><td class="py-3">Química (Mol)</td></tr>
                                    <tr class="border-bottom"><td class="py-3">Quarta</td><td class="py-3">Física (Mecânica)</td><td class="py-3">Simulado Curto</td></tr>
                                    <tr class="border-bottom"><td class="py-3">Quinta</td><td class="py-3">História (Brasil)</td><td class="py-3">Sociologia</td></tr>
                                    <tr class="border-bottom"><td class="py-3">Sexta</td><td class="py-3">Linguagens</td><td class="py-3">Revisão de Erros</td></tr>
                                    <tr class="fw-bold" style="color: var(--primary-color);"><td>Sábado</td><td>Mega Simulado</td><td>Descanso Ativo</td></tr>
                                </tbody>
                            </table>
                        </div>`;
                output.innerHTML = html;
                form.classList.remove('opacity-50');
                window.scrollTo({ top: document.body.scrollHeight, behavior: 'smooth' });
            }, 2000);
        }
    </script>
</body>
</html>
