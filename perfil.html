<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Minha Conta - Mindly</title>
    <link rel="icon" href="assets/logo.png" type="image/png">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">
    <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
    <script>
        const temaSalvo = localStorage.getItem('theme');
        const prefereDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
        const temaInicial = temaSalvo || (prefereDark ? 'dark' : 'light');
        if (temaInicial === 'dark') document.documentElement.setAttribute('data-theme', 'dark');

        // Proteção de Rota
        const userLogged = localStorage.getItem('mindly_user_logged');
        if(userLogged !== 'Alex') {
            window.location.href = 'login.html';
        }
    </script>
    <style>
        .profile-header {
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: 25px;
            padding: 3rem;
            margin-bottom: 2rem;
            position: relative;
            overflow: hidden;
        }
        .profile-avatar-large {
            width: 120px;
            height: 120px;
            border: 4px solid var(--primary-color);
            cursor: pointer;
            transition: 0.3s;
        }
        .profile-avatar-large:hover { transform: scale(1.05); }
        .info-group {
            background: var(--bg-body);
            padding: 1.5rem;
            border-radius: 15px;
            margin-bottom: 1rem;
            border: 1px solid var(--border-color);
        }
        .info-label {
            font-size: 0.75rem;
            text-transform: uppercase;
            color: var(--text-muted);
            font-weight: 700;
            margin-bottom: 0.5rem;
            display: block;
        }
        .info-value {
            font-size: 1.1rem;
            font-weight: 600;
            color: var(--text-main);
        }
    </style>
</head>
<body style="background: var(--bg-body);">

    <nav class="navbar navbar-expand-lg navbar-custom">
        <div class="container-fluid" style="max-width: 1300px;">
            <a class="navbar-brand logo-container" href="dashboard.html">
                <img src="assets/logo.png" alt="Mindly Logo">
            </a>
            <div class="ms-auto d-flex align-items-center auth-links">
                <a href="dashboard.html" class="btn btn-outline-secondary btn-sm rounded-pill me-3">
                    <i class="bi bi-arrow-left"></i> Voltar ao Dashboard
                </a>
            </div>
        </div>
    </nav>

    <main class="container py-5" data-aos="fade-up">
        <div class="row justify-content-center">
            <div class="col-lg-8">
                <div class="profile-header text-center">
                    <div class="position-relative d-inline-block mb-4">
                        <img src="https://api.dicebear.com/7.x/avataaars/svg?seed=Alex" alt="Avatar" id="userAvatarProfile" class="rounded-circle profile-avatar-large">
                        <div class="position-absolute bottom-0 end-0 bg-primary rounded-circle d-flex align-items-center justify-content-center" style="width: 35px; height: 35px; border: 3px solid var(--bg-card);">
                            <i class="bi bi-camera-fill text-white"></i>
                        </div>
                    </div>
                    <h2 class="fw-800 mb-1" id="profileName">Alex Mindly</h2>
                    <p class="text-muted mb-4">Membro desde Março de 2026</p>
                    <div class="d-flex justify-content-center gap-3">
                        <span class="badge bg-primary px-3 py-2 rounded-pill" id="profileLevel">LVL 14</span>
                        <span class="badge bg-warning text-dark px-3 py-2 rounded-pill d-none" id="proBadge">ASSINANTE PRO</span>
                    </div>
                </div>

                <div class="row">
                    <div class="col-md-6">
                        <div class="info-group">
                            <span class="info-label">Nome Completo</span>
                            <div class="info-value">Alex Mindly</div>
                        </div>
                    </div>
                    <div class="col-md-6">
                        <div class="info-group">
                            <span class="info-label">E-mail</span>
                            <div class="info-value">alex@estudante.com.br</div>
                        </div>
                    </div>
                    <div class="col-md-6">
                        <div class="info-group">
                            <span class="info-label">Plano Atual</span>
                            <div class="info-value" id="planValue">Gratuito</div>
                        </div>
                    </div>
                    <div class="col-md-6">
                        <div class="info-group">
                            <span class="info-label">XP Acumulado</span>
                            <div class="info-value" id="xpValue">1450 XP</div>
                        </div>
                    </div>
                </div>

                <div class="mt-5 p-4 rounded-4 border-dashed text-center" style="border: 2px dashed var(--border-color);">
                    <h5 class="fw-bold mb-3">Privacidade e Segurança</h5>
                    <div class="d-flex justify-content-center gap-3">
                        <button class="btn btn-light rounded-pill px-4">Alterar Senha</button>
                        <button class="btn btn-outline-danger rounded-pill px-4" onclick="logout()">Sair da Conta</button>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <script src="theme.js"></script>
    <script>
        AOS.init({ duration: 800, once: true });

        document.addEventListener('DOMContentLoaded', () => {
            const isPro = localStorage.getItem('mindly_pro') === 'true';
            const xp = localStorage.getItem('mindly_xp') || 1450;
            const level = localStorage.getItem('mindly_level') || 14;
            const avatar = localStorage.getItem('mindly_avatar') || 'Alex';

            if(isPro) {
                document.getElementById('proBadge').classList.remove('d-none');
                document.getElementById('planValue').innerText = 'Mindly Pro (Ativo)';
                document.getElementById('planValue').classList.add('text-warning');
            }

            document.getElementById('xpValue').innerText = `${xp} XP`;
            document.getElementById('profileLevel').innerText = `LVL ${level}`;
            document.getElementById('userAvatarProfile').src = `https://api.dicebear.com/7.x/avataaars/svg?seed=${avatar}`;

            // Habilitar clique para mudar avatar
            document.getElementById('userAvatarProfile').addEventListener('click', abrirModalAvatar);
        });

        function abrirModalAvatar() {
            const seeds = ['Alex', 'Charlie', 'Bibi', 'Joy', 'Midnight', 'Spooky'];
            const currentAvatar = localStorage.getItem('mindly_avatar') || 'Alex';
            const container = document.createElement('div');
            container.className = 'modal-backdrop fade show';
            container.innerHTML = `
                <div class="modal fade show d-block" tabindex="-1">
                    <div class="modal-dialog modal-dialog-centered">
                        <div class="modal-content border-0 rounded-4 shadow-lg" style="background: var(--bg-card); color: var(--text-main);">
                            <div class="modal-header border-0 pb-0">
                                <h5 class="modal-title fw-800">Escolha seu Avatar de Elite</h5>
                                <button type="button" class="btn-close" onclick="this.closest('.modal-backdrop').remove()"></button>
                            </div>
                            <div class="modal-body text-center py-4">
                                <div class="d-flex flex-wrap justify-content-center gap-3">
                                    ${seeds.map(s => `
                                        <div class="avatar-option p-2 rounded-4 border-2 border" 
                                             style="cursor: pointer; transition: 0.3s; ${currentAvatar === s ? 'border-color: var(--primary-color);' : 'border-color: var(--border-color);'}"
                                             onclick="setAvatar('${s}')">
                                            <img src="https://api.dicebear.com/7.x/avataaars/svg?seed=${s}" width="60" class="rounded-circle">
                                        </div>
                                    `).join('')}
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            `;
            document.body.appendChild(container);
        }

        window.setAvatar = (seed) => {
            if (window.setMindlyAvatar) {
                window.setMindlyAvatar(seed);
            } else {
                localStorage.setItem('mindly_avatar', seed);
                document.getElementById('userAvatarProfile').src = `https://api.dicebear.com/7.x/avataaars/svg?seed=${seed}`;
            }
            document.querySelector('.modal-backdrop').remove();
        };

        function logout() {
            if(confirm('Deseja realmente sair da conta?')) {
                localStorage.removeItem('mindly_user_logged'); // Limpa sessão
                window.location.href = 'index.html';
            }
        }
    </script>
</body>
</html>
